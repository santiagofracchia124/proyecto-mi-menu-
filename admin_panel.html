<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hanna accs · Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
    --accent: #b8a4e8; --accent2: #f3b8d9; --text: #f0f0f0; --muted: #777;
    --gold: #f59e0b; --green: #10b981; --blue: #3b82f6; --orange: #f97316;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 1.5rem; }
  .brand { font-family: 'Fredoka', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .brand::before { content: ''; width: 14px; height: 14px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #94a9ec 48%, var(--accent2)); flex-shrink: 0; }
  .brand span { color: var(--accent); }
  .badge-panel { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .admin-name { font-size: 0.85rem; color: var(--muted); }
  .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 0.35rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: all 0.2s; }
  .btn-logout:hover { border-color: var(--accent); color: var(--text); }

  .main { padding: 2rem; max-width: 1100px; margin: 0 auto; }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-state p { font-size: 0.88rem; }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.7rem 1.4rem; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: all 0.3s; z-index: 500; border-left: 3px solid var(--green); }
  .toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-left-color: var(--accent); }

  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.8rem; flex-wrap: wrap; gap: 1rem; }
  .page-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
  .page-sub   { font-size: 0.82rem; color: var(--muted); }
  .btn-nuevo-cat { background: var(--accent); color: #1a1820; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .btn-nuevo-cat:hover { background: var(--accent2); }

  .modal-ben-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; }
  .modal-ben-overlay.open { display: block; }
  .modal-ben { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 420px; z-index: 201; max-height: 85vh; overflow-y: auto; }
  .modal-ben.open { display: block; }
  .modal-ben-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
  .modal-ben-header h3 { font-size: 1rem; font-weight: 600; }
  .modal-ben-body { display: flex; flex-direction: column; gap: 0.9rem; }
  .mfield { display: flex; flex-direction: column; gap: 0.3rem; }
  .mfield label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .mfield input, .mfield select, .mfield textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.2s; }
  .mfield input:focus, .mfield select:focus, .mfield textarea:focus { border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
  .btn-guardar-ben { background: var(--accent); color: #1a1820; border: none; border-radius: 8px; padding: 0.75rem; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 600; cursor: pointer; margin-top: 0.3rem; transition: background 0.2s; }
  .btn-guardar-ben:hover { background: var(--accent2); }

  .menu-cat-block  { margin-bottom:1.5rem; background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .menu-cat-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.2rem; cursor:pointer; }
  .menu-cat-title  { font-weight:600; font-size:0.95rem; display:flex; align-items:center; gap:0.5rem; }
  .menu-cat-actions { display:flex; gap:0.4rem; }
  .menu-subcat-block  { border-top:1px solid var(--border); padding:0.8rem 1.2rem; }
  .menu-subcat-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem; }
  .menu-subcat-title  { font-size:0.85rem; color:var(--muted); font-weight:500; }
  .menu-items-list { display:flex; flex-direction:column; gap:0.4rem; }
  .menu-item-row   { display:flex; align-items:center; justify-content:space-between; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.5rem 0.8rem; gap: 0.6rem; flex-wrap: wrap; }
  .menu-item-info  { display:flex; align-items:center; gap:0.6rem; font-size:0.85rem; flex-wrap: wrap; }
  .menu-item-precio { font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--gold); margin-left:0.2rem; }
  .menu-item-stock { font-family:'DM Mono',monospace; font-size:0.72rem; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .menu-item-stock.ok  { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
  .menu-item-stock.low { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
  .menu-item-stock.out { background: rgba(248,113,113,0.12); color: #fca5a5; border: 1px solid rgba(248,113,113,0.25); }
  .menu-item-actions { display:flex; gap:0.3rem; }
  .btn-sm { background:var(--surface2); border:1px solid var(--border); color:var(--muted); border-radius:5px; padding:0.2rem 0.6rem; font-size:0.72rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .btn-sm:hover { border-color:#444; color:var(--text); }
  .btn-sm.danger:hover { border-color:var(--accent); color:#f87171; }
  .btn-sm.primary { background:rgba(148,169,236,0.12); border-color:rgba(148,169,236,0.3); color:#93a8e8; }
  .add-item-btn { margin-top:0.4rem; width:100%; background:transparent; border:1px dashed var(--border); color:var(--muted); border-radius:6px; padding:0.4rem; font-size:0.75rem; cursor:pointer; transition:all 0.15s; }
  .add-item-btn:hover { border-color:#555; color:var(--text); }

  @media (max-width: 900px) {
    .main { padding: 1rem; }
    .row2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="brand">hanna<span>accs</span></div>
    <div class="badge-panel">Panel</div>
  </div>
  <div class="topbar-right">
    <span class="admin-name">{{ admin.nombre }}</span>
    <a href="/admin/logout" class="btn-logout">Salir</a>
  </div>
</div>

<div class="main">
  <div class="page-header">
    <div>
      <h2 class="page-title">Catálogo de productos</h2>
      <p class="page-sub">Agregá, editá o eliminá categorías, secciones y productos. Los cambios se ven al instante en la página pública.</p>
    </div>
    <button class="btn-nuevo-cat" onclick="abrirModalNuevaCat()">+ Nueva categoría</button>
  </div>
  <div id="menu-admin-content"><div class="loading">Cargando catálogo...</div></div>
</div>

<!-- MODAL MENU -->
<div class="modal-ben-overlay" id="modal-menu-overlay" onclick="cerrarModalMenu()"></div>
<div class="modal-ben" id="modal-menu">
  <div class="modal-ben-header">
    <h3 id="modal-menu-titulo">Nuevo producto</h3>
    <button onclick="cerrarModalMenu()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer">x</button>
  </div>
  <div class="modal-ben-body" id="modal-menu-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
function mostrarToast(msg, error) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  clearTimeout(mostrarToast._t);
  mostrarToast._t = setTimeout(() => { t.classList.remove('show'); }, 2600);
}

// MENU ADMIN
let menuAdminData = [];

async function cargarMenuAdmin() {
  const r = await fetch('/admin/api/menu');
  menuAdminData = await r.json();
  renderMenuAdmin();
}

function stockBadge(stock) {
  stock = Number(stock) || 0;
  let clase = 'ok', label = stock + ' unidades';
  if (stock <= 0) { clase = 'out'; label = 'Sin stock'; }
  else if (stock <= 3) { clase = 'low'; label = stock + ' unidades'; }
  return `<span class="menu-item-stock ${clase}">${label}</span>`;
}

function renderMenuAdmin() {
  const cont = document.getElementById('menu-admin-content');
  if (!menuAdminData.length) { cont.innerHTML = '<div class="empty-state"><p>No hay categorías todavía. Creá la primera arriba.</p></div>'; return; }
  cont.innerHTML = menuAdminData.map(cat => `
    <div class="menu-cat-block">
      <div class="menu-cat-header" onclick="toggleCat('cat-${cat.id}')">
        <div class="menu-cat-title">${cat.nombre} ${!cat.activo ? '<span style="color:var(--muted);font-size:0.7rem">(inactiva)</span>' : ''}</div>
        <div class="menu-cat-actions" onclick="event.stopPropagation()">
          <button class="btn-sm primary" onclick="abrirModalNuevaSubcat('${cat.clave}', '${cat.nombre}')">+ Sección</button>
          <button class="btn-sm" onclick="abrirModalEditarCat(${JSON.stringify(cat).replace(/"/g,'&quot;')})">Editar</button>
          <button class="btn-sm danger" onclick="eliminarCat(${cat.id})">Eliminar</button>
        </div>
      </div>
      <div id="cat-${cat.id}">
        ${cat.subcategorias.map(sub => `
          <div class="menu-subcat-block">
            <div class="menu-subcat-header">
              <div class="menu-subcat-title">${sub.nombre} ${!sub.activo ? '(inactiva)' : ''}</div>
              <div class="menu-item-actions">
                <button class="btn-sm" onclick="abrirModalEditarSubcat(${sub.id}, '${sub.nombre.replace(/'/g,"\\'")}', ${sub.activo})">Editar</button>
                <button class="btn-sm danger" onclick="eliminarSubcat(${sub.id})">Eliminar</button>
              </div>
            </div>
            <div class="menu-items-list">
              ${sub.items.map(it => `
                <div class="menu-item-row">
                  <div class="menu-item-info">
                    ${it.imagen ? `<img src="${it.imagen}" style="width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--border)" title="Tiene imagen"/>` : `<span style="width:32px;height:32px;background:var(--surface2);border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--muted)">IMG</span>`}
                    <span>${it.nombre}</span>
                    <span class="menu-item-precio">$${it.precio.toLocaleString('es-AR')}</span>
                    ${stockBadge(it.stock)}
                    ${!it.activo ? '<span style="color:var(--muted);font-size:0.7rem">(inactivo)</span>' : ''}
                  </div>
                  <div class="menu-item-actions">
                    <button class="btn-sm" onclick='abrirModalEditarItem(${JSON.stringify(it)})'>Editar</button>
                    <button class="btn-sm danger" onclick="eliminarItem(${it.id})">Eliminar</button>
                  </div>
                </div>`).join('')}
              <button class="add-item-btn" onclick="abrirModalNuevoItem(${sub.id}, '${sub.nombre.replace(/'/g,"\\'")}')">+ Agregar producto</button>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleCat(id) { const el = document.getElementById(id); if (el) el.style.display = el.style.display === 'none' ? '' : 'none'; }

function cerrarModalMenu() { document.getElementById('modal-menu-overlay').classList.remove('open'); document.getElementById('modal-menu').classList.remove('open'); }
function abrirModalMenu(titulo, bodyHtml) {
  document.getElementById('modal-menu-titulo').textContent = titulo;
  document.getElementById('modal-menu-body').innerHTML = bodyHtml;
  document.getElementById('modal-menu-overlay').classList.add('open');
  document.getElementById('modal-menu').classList.add('open');
}

// CATEGORIAS
function abrirModalNuevaCat() {
  abrirModalMenu('Nueva categoría', `
    <input type="hidden" id="m-emoji" value=""/>
    <div class="mfield"><label>Nombre</label><input type="text" id="m-nombre" placeholder="Ej: Anillos"/></div>
    <button class="btn-guardar-ben" onclick="crearCat()">Crear categoría</button>`);
}
function abrirModalEditarCat(cat) {
  abrirModalMenu('Editar categoría', `
    <input type="hidden" id="m-id" value="${cat.id}"/>
    <input type="hidden" id="m-emoji" value="${cat.emoji}"/>
    <div class="mfield"><label>Nombre</label><input type="text" id="m-nombre" value="${cat.nombre}"/></div>
    <div class="mfield"><label>Estado</label><select id="m-activo"><option value="true" ${cat.activo?'selected':''}>Activa</option><option value="false" ${!cat.activo?'selected':''}>Inactiva</option></select></div>
    <button class="btn-guardar-ben" onclick="editarCat()">Guardar</button>`);
}
async function crearCat() {
  const r = await fetch('/admin/api/menu/categorias', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:document.getElementById('m-nombre').value,emoji:document.getElementById('m-emoji').value})});
  const d = await r.json();
  if (d.ok) { cerrarModalMenu(); cargarMenuAdmin(); mostrarToast('Categoría creada'); } else mostrarToast(d.error||'Error',true);
}
async function editarCat() {
  const id = document.getElementById('m-id').value;
  const r = await fetch(`/admin/api/menu/categorias/${id}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:document.getElementById('m-nombre').value,emoji:document.getElementById('m-emoji').value,activo:document.getElementById('m-activo').value==='true'})});
  const d = await r.json();
  if (d.ok) { cerrarModalMenu(); cargarMenuAdmin(); mostrarToast('Categoría actualizada'); }
}
async function eliminarCat(id) {
  if (!confirm('¿Desactivar esta categoría y todas sus secciones?')) return;
  await fetch(`/admin/api/menu/categorias/${id}`, {method:'DELETE'});
  cargarMenuAdmin(); mostrarToast('Categoría desactivada');
}

// SUBCATEGORIAS
function abrirModalNuevaSubcat(catClave, catNombre) {
  abrirModalMenu(`Nueva sección en "${catNombre}"`, `
    <input type="hidden" id="m-cat-clave" value="${catClave}"/>
    <div class="mfield"><label>Nombre de la sección</label><input type="text" id="m-nombre" placeholder="Ej: Acero quirúrgico"/></div>
    <button class="btn-guardar-ben" onclick="crearSubcat()">Crear sección</button>`);
}
function abrirModalEditarSubcat(id, nombre, activo) {
  abrirModalMenu('Editar sección', `
    <input type="hidden" id="m-id" value="${id}"/>
    <div class="mfield"><label>Nombre</label><input type="text" id="m-nombre" value="${nombre}"/></div>
    <div class="mfield"><label>Estado</label><select id="m-activo"><option value="true" ${activo?'selected':''}>Activa</option><option value="false" ${!activo?'selected':''}>Inactiva</option></select></div>
    <button class="btn-guardar-ben" onclick="editarSubcat()">Guardar</button>`);
}
async function crearSubcat() {
  const r = await fetch('/admin/api/menu/subcategorias', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:document.getElementById('m-nombre').value,categoria_clave:document.getElementById('m-cat-clave').value})});
  const d = await r.json();
  if (d.ok) { cerrarModalMenu(); cargarMenuAdmin(); mostrarToast('Sección creada'); } else mostrarToast(d.error||'Error',true);
}
async function editarSubcat() {
  const id = document.getElementById('m-id').value;
  const r = await fetch(`/admin/api/menu/subcategorias/${id}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:document.getElementById('m-nombre').value,activo:document.getElementById('m-activo').value==='true'})});
  const d = await r.json();
  if (d.ok) { cerrarModalMenu(); cargarMenuAdmin(); mostrarToast('Sección actualizada'); }
}
async function eliminarSubcat(id) {
  if (!confirm('¿Desactivar esta sección y todos sus productos?')) return;
  await fetch(`/admin/api/menu/subcategorias/${id}`, {method:'DELETE'});
  cargarMenuAdmin(); mostrarToast('Sección desactivada');
}

// PRODUCTOS
function abrirModalNuevoItem(subcatId, subcatNombre) {
  abrirModalMenu(`Nuevo producto en "${subcatNombre}"`, `
    <input type="hidden" id="m-subcat-id" value="${subcatId}"/>
    <div class="mfield"><label>Nombre</label><input type="text" id="m-nombre" placeholder="Ej: Anillo luna"/></div>
    <div class="mfield"><label>Descripción</label><textarea id="m-desc" placeholder="Material, medidas, detalles..." rows="2"></textarea></div>
    <div class="row2">
      <div class="mfield"><label>Precio ($)</label><input type="number" id="m-precio" placeholder="3500" min="1"/></div>
      <div class="mfield"><label>Cantidad de unidades</label><input type="number" id="m-stock" placeholder="10" min="0" value="0"/></div>
    </div>
    <div class="mfield"><label>Imagen del producto (opcional)</label>
      <input type="file" id="m-img-input" accept="image/*" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.5rem;color:var(--text);width:100%;font-size:.85rem"/>
      <p style="font-size:.72rem;color:var(--muted);margin-top:.3rem">Podés agregar la imagen después de crear el producto.</p>
    </div>
    <button class="btn-guardar-ben" onclick="crearItem()">Agregar producto</button>`);
}
function abrirModalEditarItem(it) {
  const imgPreview = it.imagen ? `<img id="m-img-preview" src="${it.imagen}" style="width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-bottom:.5rem;border:1px solid var(--border)"/>` : `<div id="m-img-preview-empty" style="background:var(--bg);border:1px dashed var(--border);border-radius:8px;height:80px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.78rem;margin-bottom:.5rem">Sin imagen</div>`;
  abrirModalMenu('Editar producto', `
    <input type="hidden" id="m-id" value="${it.id}"/>
    <input type="hidden" id="m-emoji" value="${it.emoji||''}"/>
    <div class="mfield"><label>Nombre</label><input type="text" id="m-nombre" value="${it.nombre}"/></div>
    <div class="mfield"><label>Descripción</label><textarea id="m-desc" rows="2">${it.desc ?? it.descripcion ?? ''}</textarea></div>
    <div class="row2">
      <div class="mfield"><label>Precio ($)</label><input type="number" id="m-precio" value="${it.precio}" min="1"/></div>
      <div class="mfield"><label>Cantidad de unidades</label><input type="number" id="m-stock" value="${it.stock ?? 0}" min="0"/></div>
    </div>
    <div class="mfield"><label>Estado</label><select id="m-activo"><option value="true" ${it.activo?'selected':''}>Activo</option><option value="false" ${!it.activo?'selected':''}>Inactivo</option></select></div>
    <div class="mfield">
      <label>Imagen del producto</label>
      ${imgPreview}
      <input type="file" id="m-img-input" accept="image/*" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.5rem;color:var(--text);width:100%;font-size:.85rem" onchange="previewImg(this)"/>
      <button type="button" style="margin-top:.4rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.35rem .9rem;font-size:.8rem;cursor:pointer" onclick="subirImagenItem(${it.id})">Subir imagen</button>
    </div>
    <button class="btn-guardar-ben" onclick="editarItem()">Guardar datos</button>`);
}

function previewImg(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    let preview = document.getElementById('m-img-preview');
    if (!preview) {
      preview = document.createElement('img');
      preview.id = 'm-img-preview';
      preview.style = 'width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-bottom:.5rem;border:1px solid var(--border)';
      const empty = document.getElementById('m-img-preview-empty');
      if (empty) empty.replaceWith(preview);
      else input.parentElement.prepend(preview);
    }
    preview.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}
async function crearItem() {
  const r = await fetch('/admin/api/menu/items', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subcategoria_id:document.getElementById('m-subcat-id').value,emoji:'',nombre:document.getElementById('m-nombre').value,desc:document.getElementById('m-desc').value,precio:document.getElementById('m-precio').value,stock:document.getElementById('m-stock').value})});
  const d = await r.json();
  if (d.ok) { cerrarModalMenu(); cargarMenuAdmin(); mostrarToast('Producto agregado'); } else mostrarToast(d.error||'Error',true);
}
async function editarItem() {
  const id = document.getElementById('m-id').value;
  const r = await fetch(`/admin/api/menu/items/${id}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({emoji:document.getElementById('m-emoji').value,nombre:document.getElementById('m-nombre').value,desc:document.getElementById('m-desc').value,precio:document.getElementById('m-precio').value,stock:document.getElementById('m-stock').value,activo:document.getElementById('m-activo').value==='true'})});
  const d = await r.json();
  if (d.ok) { cerrarModalMenu(); cargarMenuAdmin(); mostrarToast('Producto actualizado'); }
}
async function eliminarItem(id) {
  if (!confirm('¿Desactivar este producto?')) return;
  await fetch(`/admin/api/menu/items/${id}`, {method:'DELETE'});
  cargarMenuAdmin(); mostrarToast('Producto desactivado');
}

// IMAGEN DE PRODUCTO
async function subirImagenItem(itemId) {
  const input = document.getElementById('m-img-input');
  if (!input || !input.files || !input.files[0]) {
    mostrarToast('Seleccioná una imagen primero', true);
    return;
  }
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = async function(e) {
    const dataUrl = e.target.result;
    try {
      const r = await fetch(`/admin/api/menu/items/${itemId}/imagen`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({imagen: dataUrl})
      });
      const d = await r.json();
      if (d.ok) {
        mostrarToast('Imagen guardada ✓');
        cargarMenuAdmin();
        const preview = document.getElementById('m-img-preview');
        if (preview) preview.src = d.url + '?t=' + Date.now();
      } else {
        mostrarToast(d.error || 'Error al subir imagen', true);
      }
    } catch(err) {
      mostrarToast('Error de conexión', true);
    }
  };
  reader.readAsDataURL(file);
}

cargarMenuAdmin();
</script>
