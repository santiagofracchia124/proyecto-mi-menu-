<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén Higuera — Administrador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#232220;
    --bg-alt:#2b2925;
    --panel:#2f2d29;
    --cream:#f2ead8;
    --mustard:#d9a441;
    --olive:#6b7a4f;
    --brick:#a85c4a;
    --muted:#8a8478;
    --line: rgba(242,234,216,0.16);
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--cream);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
 
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 22px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:rgba(35,34,32,0.92);
    backdrop-filter:blur(6px);
    z-index:20;
  }
  .brandmark{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.05rem;
    letter-spacing:0.02em;
  }
  .brandmark .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--mustard);
    flex-shrink:0;
  }
  .tabbtn{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
    padding:8px 14px;
    border-radius:var(--radius);
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .tabbtn:hover, .tabbtn:focus-visible{
    border-color:var(--mustard);
    color:var(--cream);
    outline:none;
  }
 
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-family:'Fraunces', serif;
    font-style:italic;
  }
 
  .admin-wrap{max-width:640px;margin:0 auto;padding:40px 22px 100px;}
  .admin-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
  }
  .admin-head h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.6rem;
    margin:0;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:22px;
    margin-bottom:20px;
  }
  label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
    margin-top:14px;
  }
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=number], input[type=password], textarea{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--cream);
    padding:10px 12px;
    border-radius:var(--radius);
    font-family:'Inter', sans-serif;
    font-size:0.9rem;
  }
  input:focus, textarea:focus{
    outline:none;
    border-color:var(--mustard);
  }
  textarea{resize:vertical;min-height:60px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .filelabel{
    display:inline-block;
    margin-top:8px;
    padding:8px 14px;
    border:1px dashed var(--line);
    border-radius:var(--radius);
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    color:var(--muted);
    cursor:pointer;
    text-align:center;
  }
  .filelabel:hover{border-color:var(--mustard);color:var(--cream);}
  input[type=file]{display:none;}
  .img-preview{
    margin-top:10px;
    width:90px;height:90px;
    object-fit:cover;
    border-radius:var(--radius);
    border:1px solid var(--line);
    display:none;
  }
  .btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.75rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:11px 20px;
    border-radius:var(--radius);
    border:1px solid transparent;
    cursor:pointer;
    transition:opacity .15s ease;
  }
  .btn:hover{opacity:0.88;}
  .btn-primary{background:var(--mustard);color:#232220;font-weight:500;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--cream);}
  .btn-danger{background:transparent;border:1px solid var(--brick);color:var(--brick);}
  .btn-row{display:flex;gap:10px;margin-top:20px;}
 
  .admin-item{
    display:flex;
    gap:12px;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .admin-item:last-child{border-bottom:none;}
  .admin-item img{
    width:46px;height:46px;object-fit:cover;border-radius:var(--radius);
    border:1px solid var(--line);
    flex-shrink:0;
    background:var(--bg);
  }
  .admin-item .meta{flex:1;min-width:0;}
  .admin-item .meta .name{font-family:'Fraunces', serif;font-weight:500;font-size:0.95rem;}
  .admin-item .meta .sub{font-family:'IBM Plex Mono', monospace;font-size:0.72rem;color:var(--muted);margin-top:2px;}
  .admin-item .actions{display:flex;gap:6px;flex-shrink:0;}
  .iconbtn{
    background:transparent;border:1px solid var(--line);color:var(--muted);
    width:30px;height:30px;border-radius:var(--radius);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:0.85rem;
  }
  .iconbtn:hover{border-color:var(--mustard);color:var(--cream);}
 
  .login-box{
    max-width:340px;margin:90px auto;
    text-align:center;
  }
  .login-box h1{
    font-family:'Fraunces', serif;font-weight:600;font-size:1.6rem;margin-bottom:6px;
  }
  .login-box p{color:var(--muted);font-size:0.85rem;margin-bottom:24px;}
  .err{color:var(--brick);font-size:0.78rem;font-family:'IBM Plex Mono',monospace;margin-top:10px;min-height:16px;}
 
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--cream);color:#232220;
    font-family:'IBM Plex Mono', monospace;font-size:0.78rem;
    padding:11px 20px;border-radius:var(--radius);
    opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
 
  ::selection{background:var(--mustard);color:#232220;}
</style>
</head>
<body>
 
<div id="app"></div>
<div class="toast" id="toast"></div>
 
<script>
(function(){
  const DEFAULT_DATA = {
    items: [
      {id:"i1", category:"Empanadas", name:"Carne cortada a cuchillo", price:1800, description:"Cebolla, pimiento, huevo y comino.", image:""},
      {id:"i2", category:"Empanadas", name:"Humita", price:1600, description:"", image:""},
      {id:"i3", category:"Sándwiches", name:"Miga jamón y queso", price:2400, description:"Pan de miga tostado.", image:""},
      {id:"i4", category:"Café y algo dulce", name:"Café con leche + medialuna", price:2200, description:"", image:""}
    ]
  };
  const ADMIN_PASSWORD = "kiara";
  const STORAGE_KEY = "menu:data";
 
  let state = { view:"login", data:null, loading:true, authed:false, editingId:null };
 
  function fmtPrice(n){ return "$" + Number(n).toLocaleString("es-AR"); }
  function uid(){ return "i" + Math.random().toString(36).slice(2,10); }
 
  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }
 
  async function loadData(){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      state.data = res ? JSON.parse(res.value) : DEFAULT_DATA;
    }catch(e){
      state.data = DEFAULT_DATA;
    }
    state.loading = false;
    render();
  }
 
  async function saveData(){
    try{
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(state.data), true);
      if(!result) throw new Error("sin respuesta");
      showToast("Guardado");
    }catch(e){
      showToast("No se pudo guardar. Probá de nuevo.");
      console.error("storage error", e);
    }
  }
 
  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=> t.classList.remove("show"), 2200);
  }
 
  function render(){
    const app = document.getElementById("app");
    if(state.loading){
      app.innerHTML = `<div class="empty-state">Cargando…</div>`;
      return;
    }
    if(!state.authed){
      app.innerHTML = renderLogin();
    } else if(state.view === "admin"){
      app.innerHTML = renderAdmin();
    } else if(state.view === "form"){
      app.innerHTML = renderForm();
    }
    attachHandlers();
  }
 
  function renderLogin(){
    return `
      <div class="topbar">
        <div class="brandmark"><span class="dot"></span> Almacén Higuera — Admin</div>
        <a class="tabbtn" href="menu.html" style="text-decoration:none;display:inline-block;">Ver carta</a>
      </div>
      <div class="login-box">
        <h1>Panel de edición</h1>
        <p>Ingresá la contraseña para editar la carta.</p>
        <input type="password" id="pw-input" placeholder="Contraseña" autofocus>
        <div class="btn-row" style="justify-content:center;">
          <button class="btn btn-primary" data-action="try-login">Entrar</button>
        </div>
        <div class="err" id="login-err"></div>
      </div>
    `;
  }
 
  function renderAdmin(){
    const items = state.data.items;
    return `
      <div class="topbar">
        <div class="brandmark"><span class="dot"></span> Almacén Higuera — Admin</div>
        <a class="tabbtn" href="menu.html" style="text-decoration:none;display:inline-block;">Ver carta pública</a>
      </div>
      <div class="admin-wrap">
        <div class="admin-head">
          <h1>Platos (${items.length})</h1>
          <button class="btn btn-primary" data-action="new-item">+ Agregar plato</button>
        </div>
        <div class="card">
          ${items.length === 0
            ? `<div class="empty-state" style="padding:20px;">No hay platos todavía. Agregá el primero.</div>`
            : items.map(it => `
              <div class="admin-item">
                ${it.image ? `<img src="${escapeHtml(it.image)}" alt="">` : `<div style="width:46px;height:46px;background:var(--bg);border-radius:3px;border:1px solid var(--line);flex-shrink:0;"></div>`}
                <div class="meta">
                  <div class="name">${escapeHtml(it.name)}</div>
                  <div class="sub">${escapeHtml(it.category || "Otros")} · ${fmtPrice(it.price)}</div>
                </div>
                <div class="actions">
                  <button class="iconbtn" title="Editar" data-action="edit-item" data-id="${it.id}">✎</button>
                  <button class="iconbtn" title="Eliminar" data-action="delete-item" data-id="${it.id}">✕</button>
                </div>
              </div>
            `).join("")}
        </div>
      </div>
    `;
  }
 
  function renderForm(){
    const editing = state.editingId ? state.data.items.find(i=>i.id===state.editingId) : null;
    const cats = [...new Set(state.data.items.map(i=>i.category).filter(Boolean))];
    return `
      <div class="topbar">
        <div class="brandmark"><span class="dot"></span> Almacén Higuera — Admin</div>
        <button class="tabbtn" data-action="go-admin">Volver</button>
      </div>
      <div class="admin-wrap">
        <div class="admin-head">
          <h1>${editing ? "Editar plato" : "Nuevo plato"}</h1>
        </div>
        <div class="card">
          <label>Nombre del plato</label>
          <input type="text" id="f-name" value="${escapeHtml(editing?.name || "")}" placeholder="Ej: Tarta de acelga">
 
          <div class="row2">
            <div>
              <label>Precio</label>
              <input type="number" id="f-price" min="0" step="1" value="${editing ? editing.price : ""}" placeholder="0">
            </div>
            <div>
              <label>Categoría</label>
              <input type="text" id="f-category" list="cat-list" value="${escapeHtml(editing?.category || "")}" placeholder="Ej: Empanadas">
              <datalist id="cat-list">
                ${cats.map(c=>`<option value="${escapeHtml(c)}">`).join("")}
              </datalist>
            </div>
          </div>
 
          <label>Descripción <span style="text-transform:none;color:var(--muted);">(opcional)</span></label>
          <textarea id="f-desc" placeholder="Ingredientes, aclaraciones, etc.">${escapeHtml(editing?.description || "")}</textarea>
 
          <label>Foto <span style="text-transform:none;color:var(--muted);">(opcional)</span></label>
          <input type="text" id="f-image-url" value="${escapeHtml(editing?.image || "")}" placeholder="Pegar una URL de imagen…">
          <label class="filelabel" for="f-image-file">o subir una foto desde el dispositivo</label>
          <input type="file" id="f-image-file" accept="image/*">
          <img class="img-preview" id="f-image-preview" src="${editing?.image ? escapeHtml(editing.image) : ""}" style="${editing?.image ? 'display:block;' : ''}">
 
          <div class="btn-row">
            <button class="btn btn-primary" data-action="save-item">${editing ? "Guardar cambios" : "Agregar plato"}</button>
            <button class="btn btn-ghost" data-action="go-admin">Cancelar</button>
            ${editing ? `<button class="btn btn-danger" data-action="delete-item" data-id="${editing.id}" style="margin-left:auto;">Eliminar</button>` : ``}
          </div>
        </div>
      </div>
    `;
  }
 
  function resizeImageFile(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          const MAX = 480;
          let w = img.width, h = img.height;
          if(w > h && w > MAX){ h = Math.round(h * MAX / w); w = MAX; }
          else if(h > MAX){ w = Math.round(w * MAX / h); h = MAX; }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", 0.72));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
 
  function attachHandlers(){
    document.querySelectorAll("[data-action]").forEach(el=>{
      el.addEventListener("click", onAction);
    });
 
    const fileInput = document.getElementById("f-image-file");
    if(fileInput){
      fileInput.addEventListener("change", async (e)=>{
        const file = e.target.files[0];
        if(!file) return;
        try{
          const dataUrl = await resizeImageFile(file);
          document.getElementById("f-image-url").value = dataUrl;
          const preview = document.getElementById("f-image-preview");
          preview.src = dataUrl;
          preview.style.display = "block";
        }catch(err){
          showToast("No se pudo procesar la imagen.");
        }
      });
    }
    const urlInput = document.getElementById("f-image-url");
    if(urlInput){
      urlInput.addEventListener("input", ()=>{
        const preview = document.getElementById("f-image-preview");
        if(urlInput.value){
          preview.src = urlInput.value;
          preview.style.display = "block";
        } else {
          preview.style.display = "none";
        }
      });
    }
    const pwInput = document.getElementById("pw-input");
    if(pwInput){
      pwInput.addEventListener("keydown", (e)=>{ if(e.key === "Enter") tryLogin(); });
    }
  }
 
  function onAction(e){
    const action = e.currentTarget.dataset.action;
    const id = e.currentTarget.dataset.id;
    if(action === "go-admin"){ state.view = "admin"; state.editingId = null; render(); }
    else if(action === "try-login"){ tryLogin(); }
    else if(action === "new-item"){ state.editingId = null; state.view = "form"; render(); }
    else if(action === "edit-item"){ state.editingId = id; state.view = "form"; render(); }
    else if(action === "delete-item"){ deleteItem(id); }
    else if(action === "save-item"){ saveItem(); }
  }
 
  function tryLogin(){
    const val = document.getElementById("pw-input").value;
    if(val === ADMIN_PASSWORD){
      state.authed = true;
      state.view = "admin";
      render();
    } else {
      document.getElementById("login-err").textContent = "Contraseña incorrecta.";
    }
  }
 
  function saveItem(){
    const name = document.getElementById("f-name").value.trim();
    const price = document.getElementById("f-price").value;
    const category = document.getElementById("f-category").value.trim();
    const desc = document.getElementById("f-desc").value.trim();
    const image = document.getElementById("f-image-url").value.trim();
 
    if(!name){ showToast("Poné un nombre para el plato."); return; }
    if(price === "" || isNaN(Number(price)) || Number(price) < 0){ showToast("Poné un precio válido."); return; }
 
    if(state.editingId){
      const it = state.data.items.find(i=>i.id===state.editingId);
      Object.assign(it, {name, price:Number(price), category, description:desc, image});
    } else {
      state.data.items.push({id:uid(), name, price:Number(price), category, description:desc, image});
    }
    state.editingId = null;
    state.view = "admin";
    render();
    saveData();
  }
 
  function deleteItem(id){
    if(!confirm("¿Eliminar este plato de la carta?")) return;
    state.data.items = state.data.items.filter(i=>i.id!==id);
    state.editingId = null;
    state.view = "admin";
    render();
    saveData();
  }
 
  loadData();
})();
</script>
</body>
</html>
