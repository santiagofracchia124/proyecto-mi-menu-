<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén Higuera — Carta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#232220;
    --bg-alt:#2b2925;
    --panel:#2f2d29;
    --cream:#f2ead8;
    --mustard:#d9a441;
    --olive:#6b7a4f;
    --brick:#a85c4a;
    --muted:#8a8478;
    --line: rgba(242,234,216,0.16);
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--cream);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
 
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 22px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:rgba(35,34,32,0.92);
    backdrop-filter:blur(6px);
    z-index:20;
  }
  .brandmark{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.05rem;
    letter-spacing:0.02em;
  }
  .brandmark .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--mustard);
    flex-shrink:0;
  }
 
  .wrap{max-width:760px;margin:0 auto;padding:0 22px 90px;}
 
  .hero{
    padding:56px 0 30px;
    text-align:center;
  }
  .hero .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--mustard);
    display:block;
    margin-bottom:14px;
  }
  .hero h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(2.2rem, 6vw, 3.4rem);
    margin:0 0 10px;
    line-height:1.05;
  }
  .hero p{
    color:var(--muted);
    font-size:0.95rem;
    margin:0;
    font-style:italic;
    font-family:'Fraunces', serif;
  }
 
  .category{margin-top:46px;}
  .category-head{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:22px;
  }
  .category-head h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-style:italic;
    font-size:1.3rem;
    color:var(--mustard);
    margin:0;
    white-space:nowrap;
  }
  .category-head .rule{
    flex:1;
    height:1px;
    background:linear-gradient(to right, var(--line) 50%, transparent 50%);
    background-size: 6px 1px;
  }
 
  .item{
    display:flex;
    gap:16px;
    padding:16px 0;
    border-bottom:1px solid var(--line);
  }
  .item:last-child{border-bottom:none;}
  .item-photo{
    width:64px;height:64px;
    border-radius:var(--radius);
    object-fit:cover;
    flex-shrink:0;
    background:var(--bg-alt);
    border:1px solid var(--line);
  }
  .item-photo.placeholder{
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);
    font-family:'IBM Plex Mono', monospace;
    font-size:0.65rem;
  }
  .item-body{flex:1;min-width:0;}
  .item-title-row{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .item-name{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:1.05rem;
    white-space:nowrap;
  }
  .leader{
    flex:1;
    border-bottom:2px dotted var(--line);
    margin-bottom:5px;
    min-width:12px;
  }
  .item-price{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.95rem;
    color:var(--mustard);
    white-space:nowrap;
  }
  .item-desc{
    color:var(--muted);
    font-size:0.85rem;
    margin-top:5px;
    line-height:1.45;
  }
 
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-family:'Fraunces', serif;
    font-style:italic;
  }
 
  .footer{
    text-align:center;
    padding:50px 0 20px;
    color:var(--muted);
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.06em;
  }
  .footer a{
    color:var(--muted);
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .footer a:hover{color:var(--cream);}
 
  ::selection{background:var(--mustard);color:#232220;}
</style>
</head>
<body>
 
<div id="app"></div>
 
<script>
(function(){
  const DEFAULT_DATA = {
    items: [
      {id:"i1", category:"Empanadas", name:"Carne cortada a cuchillo", price:1800, description:"Cebolla, pimiento, huevo y comino.", image:""},
      {id:"i2", category:"Empanadas", name:"Humita", price:1600, description:"", image:""},
      {id:"i3", category:"Sándwiches", name:"Miga jamón y queso", price:2400, description:"Pan de miga tostado.", image:""},
      {id:"i4", category:"Café y algo dulce", name:"Café con leche + medialuna", price:2200, description:"", image:""}
    ]
  };
  const STORAGE_KEY = "menu:data";
  let data = null;
 
  function fmtPrice(n){ return "$" + Number(n).toLocaleString("es-AR"); }
 
  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }
 
  function groupByCategory(items){
    const map = {};
    items.forEach(it=>{
      const cat = it.category && it.category.trim() ? it.category.trim() : "Otros";
      if(!map[cat]) map[cat] = [];
      map[cat].push(it);
    });
    return map;
  }
 
  async function loadData(){
    const app = document.getElementById("app");
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      data = res ? JSON.parse(res.value) : DEFAULT_DATA;
    }catch(e){
      data = DEFAULT_DATA;
    }
    render();
  }
 
  function render(){
    const app = document.getElementById("app");
    const groups = groupByCategory(data.items);
    const catNames = Object.keys(groups);
    const body = catNames.length === 0
      ? `<div class="empty-state">Todavía no hay platos cargados.</div>`
      : catNames.map(cat => `
        <div class="category">
          <div class="category-head"><h2>${escapeHtml(cat)}</h2><div class="rule"></div></div>
          ${groups[cat].map(it => `
            <div class="item">
              ${it.image
                ? `<img class="item-photo" src="${escapeHtml(it.image)}" alt="${escapeHtml(it.name)}">`
                : `<div class="item-photo placeholder">s/foto</div>`}
              <div class="item-body">
                <div class="item-title-row">
                  <span class="item-name">${escapeHtml(it.name)}</span>
                  <span class="leader"></span>
                  <span class="item-price">${fmtPrice(it.price)}</span>
                </div>
                ${it.description ? `<div class="item-desc">${escapeHtml(it.description)}</div>` : ``}
              </div>
            </div>
          `).join("")}
        </div>
      `).join("");
 
    app.innerHTML = `
      <div class="topbar">
        <div class="brandmark"><span class="dot"></span> Almacén Higuera</div>
      </div>
      <div class="wrap">
        <div class="hero">
          <span class="eyebrow">Carta del día</span>
          <h1>Lo que hay hoy</h1>
          <p>Todo se hace a pedido, con lo que trajo la mañana.</p>
        </div>
        ${body}
        <div class="footer">Almacén Higuera · <a href="admin.html">editar carta</a></div>
      </div>
    `;
  }
 
  loadData();
})();
</script>
</body>
</html>
