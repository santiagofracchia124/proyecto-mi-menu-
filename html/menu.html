<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hanna accs — catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0d;
    --surface:#151319;
    --surface-2:#1b1922;
    --cream:#f4eee2;
    --lavender:#b8a4e8;
    --periwinkle:#94a9ec;
    --pink:#f3b8d9;
    --muted:#948f9c;
    --line: rgba(244,238,226,0.10);
    --grad: linear-gradient(135deg, var(--lavender) 0%, var(--periwinkle) 48%, var(--pink) 100%);
    --radius: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--cream);
    font-family:'Quicksand', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;}
 
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 24px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:rgba(10,10,13,0.82);
    backdrop-filter:blur(10px);
    z-index:20;
  }
  .brandmark{
    display:flex;
    align-items:center;
    gap:9px;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:1.05rem;
    letter-spacing:0.01em;
  }
  .brandmark .moon{
    width:16px;height:16px;
    border-radius:50%;
    background:var(--grad);
    flex-shrink:0;
    position:relative;
  }
 
  .wrap{max-width:920px;margin:0 auto;padding:0 22px 100px;}
 
  /* ---------- hero ---------- */
  .hero{
    position:relative;
    padding:64px 0 40px;
    text-align:center;
    overflow:hidden;
  }
  .glow{
    position:absolute;
    top:-120px; left:50%;
    transform:translateX(-50%);
    width:520px; height:340px;
    background:radial-gradient(ellipse at center, rgba(184,164,232,0.35), rgba(148,169,236,0.22) 40%, transparent 70%);
    filter:blur(30px);
    pointer-events:none;
    z-index:0;
  }
  .avatar{
    position:relative;
    width:92px;height:92px;
    margin:0 auto 22px;
    border-radius:50%;
    background:var(--grad);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 0 3px var(--bg), 0 0 40px rgba(184,164,232,0.25);
    z-index:1;
  }
  .avatar span{
    width:66px;height:66px;
    border-radius:50%;
    background:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:0.62rem;
    color:#1a1820;
    letter-spacing:0.02em;
    text-align:center;
    line-height:1.15;
  }
  .hero h1{
    position:relative;
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:clamp(2rem, 6vw, 2.9rem);
    margin:0 0 8px;
    z-index:1;
  }
  .hero .tagline{
    position:relative;
    color:var(--muted);
    font-size:0.95rem;
    margin:0 0 14px;
    font-weight:500;
    z-index:1;
  }
  .hero .location{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:0.78rem;
    color:var(--pink);
    font-weight:600;
    letter-spacing:0.02em;
    z-index:1;
  }
 
  /* ---------- category ---------- */
  .category{margin-top:52px;}
  .category-head{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:22px;
  }
  .category-head .moon-ic{
    width:20px;height:20px;
    border-radius:50%;
    background:var(--grad);
    flex-shrink:0;
  }
  .category-head h2{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:1.2rem;
    margin:0;
    white-space:nowrap;
  }
  .category-head .rule{
    flex:1;
    height:1px;
    background:var(--line);
  }
 
  /* ---------- product grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));
    gap:16px;
  }
  .product{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:transform .18s ease, border-color .18s ease;
  }
  .product:hover{
    transform:translateY(-3px);
    border-color:rgba(184,164,232,0.4);
  }
  .product-photo{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    background:var(--surface-2);
    display:block;
  }
  .product-photo.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .product-photo.placeholder .moon-ic{
    width:34px;height:34px;
    border-radius:50%;
    background:var(--grad);
    opacity:0.5;
  }
  .product-body{
    padding:14px 14px 16px;
    display:flex;
    flex-direction:column;
    gap:6px;
    flex:1;
  }
  .product-name{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:0.98rem;
    line-height:1.25;
  }
  .product-desc{
    color:var(--muted);
    font-size:0.8rem;
    line-height:1.4;
    flex:1;
  }
  .product-foot{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:4px;
  }
  .product-price{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:1.02rem;
    background:var(--grad);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .badge-out{
    font-size:0.66rem;
    font-weight:700;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color:var(--pink);
    background:rgba(243,184,217,0.12);
    padding:3px 8px;
    border-radius:20px;
  }
  .product.out .product-photo{opacity:0.45;}
  .product.out .product-name{color:var(--muted);}
 
  .empty-state{
    text-align:center;
    padding:70px 20px;
    color:var(--muted);
    font-family:'Fredoka', sans-serif;
    font-weight:500;
  }
 
  .footer{
    text-align:center;
    padding:56px 0 20px;
    color:var(--muted);
    font-family:'Quicksand', sans-serif;
    font-size:0.78rem;
    font-weight:600;
  }
  .footer a{
    color:var(--muted);
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .footer a:hover{color:var(--cream);}
 
  ::selection{background:var(--lavender);color:#1a1820;}
 
  @media (max-width:420px){
    .grid{grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));}
  }
</style>
</head>
<body>
 
<div id="app"></div>
 
<script>
(function(){
  const DEFAULT_DATA = {
    items: [
      {id:"i1", category:"Anillos", name:"Anillo luna acero quirúrgico", price:3500, description:"Ajustable, no se pone verde.", image:"", available:true},
      {id:"i2", category:"Anillos", name:"Trío minimalista", price:4200, description:"Set de 3 anillos finos combinables.", image:"", available:true},
      {id:"i3", category:"Pulseras", name:"Pulsera dijes corazón", price:3800, description:"", image:"", available:true},
      {id:"i4", category:"Pulseras", name:"Pulsera cadena rolo", price:4600, description:"Acero dorado, resistente al agua.", image:"", available:false},
      {id:"i5", category:"Aros", name:"Mini criollas doradas", price:3200, description:"", image:"", available:true},
      {id:"i6", category:"Collares", name:"Gargantilla perlas", price:4500, description:"Perlas de río, cierre regulable.", image:"", available:true}
    ]
  };
  const STORAGE_KEY = "catalogo:data";
  let data = null;
 
  function fmtPrice(n){ return "$" + Number(n).toLocaleString("es-AR"); }
 
  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }
 
  function groupByCategory(items){
    const map = {};
    items.forEach(it=>{
      const cat = it.category && it.category.trim() ? it.category.trim() : "Otros";
      if(!map[cat]) map[cat] = [];
      map[cat].push(it);
    });
    return map;
  }
 
  async function loadData(){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      data = res ? JSON.parse(res.value) : DEFAULT_DATA;
    }catch(e){
      data = DEFAULT_DATA;
    }
    render();
  }
 
  function render(){
    const app = document.getElementById("app");
    const groups = groupByCategory(data.items);
    const catNames = Object.keys(groups);
    const body = catNames.length === 0
      ? `<div class="empty-state">Todavía no hay productos cargados ✷</div>`
      : catNames.map(cat => `
        <div class="category">
          <div class="category-head"><div class="moon-ic"></div><h2>${escapeHtml(cat)}</h2><div class="rule"></div></div>
          <div class="grid">
            ${groups[cat].map(it => `
              <div class="product ${it.available === false ? 'out' : ''}">
                ${it.image
                  ? `<img class="product-photo" src="${escapeHtml(it.image)}" alt="${escapeHtml(it.name)}">`
                  : `<div class="product-photo placeholder"><div class="moon-ic"></div></div>`}
                <div class="product-body">
                  <div class="product-name">${escapeHtml(it.name)}</div>
                  ${it.description ? `<div class="product-desc">${escapeHtml(it.description)}</div>` : ``}
                  <div class="product-foot">
                    <span class="product-price">${fmtPrice(it.price)}</span>
                    ${it.available === false ? `<span class="badge-out">Sin stock</span>` : ``}
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `).join("");
 
    app.innerHTML = `
      <div class="topbar">
        <div class="brandmark"><span class="moon"></span> hanna accs</div>
      </div>
      <div class="wrap">
        <div class="hero">
          <div class="glow"></div>
          <div class="avatar"><span>hanna<br>accs</span></div>
          <h1>completando tu look ✷</h1>
          <p class="tagline">accesorios y más 🤍</p>
          <div class="location">📍 Guernica, Bs As</div>
        </div>
        ${body}
        <div class="footer">hanna accs · <a href="admin.html">editar catálogo</a></div>
      </div>
    `;
  }
 
  loadData();
})();
</script>
</body>
</html>
